services:
  - type: web
    name: logcompta-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn log_compta_backend.wsgi:application
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: log_compta_backend.settings
      - key: PYTHON_VERSION
        value: 3.10.12